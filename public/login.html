<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="left">
    <img src="https://illustrations.popsy.co/teal/work-from-home.svg" alt="Expense tracking illustration">
  </div>

  <div class="right">
    <h2>Expense Tracker - Login</h2>

    <form id="loginForm">
      <label>Email</label>
    
      <input type="email" id="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>

      <button type="submit">Sign In</button>
    </form>

    <p class="links">
      <a href="#" id="forgotPasswordLink">Forgot password?</a><br>
      Don’t have an account? <a href="register.html">Register</a>
    </p>

    <form id="forgotPasswordForm" style="display: none; margin-top: 16px;">
      <label>Registered Email</label>
      <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>

      <label>New Password</label>
      <input type="password" id="forgotNewPassword" placeholder="Enter new password" required>

      <button type="submit">Reset Password</button>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
