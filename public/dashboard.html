<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
<div class="dashboard-shell">
  <header class="dashboard-header">
    <div>
      <h1>Expense Dashboard</h1>
      <p id="welcomeText">Track and manage your daily expenses</p>
    </div>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </header>

  <section class="stats-grid">
    <article class="stat-card">
      <p>Total Spend</p>
      <h3 id="totalAmount">₹0</h3>
    </article>
    <article class="stat-card">
      <p>This Month</p>
      <h3 id="monthlyAmount">₹0</h3>
    </article>
    <article class="stat-card">
      <p>Highest Expense</p>
      <h3 id="highestAmount">₹0</h3>
    </article>
    <article class="stat-card">
      <p>Total Entries</p>
      <h3 id="expenseCount">0</h3>
    </article>
  </section>

  <section class="panel">
    <h2>Add / Edit Expense</h2>
    <form id="expenseForm" class="expense-form">
      <input id="title" placeholder="Title" required />
      <input id="amount" type="number" min="0" step="0.01" placeholder="Amount" required />
      <input id="category" placeholder="Category (e.g. Food, Travel)" />
      <input id="date" type="date" />
      <button id="submitBtn" type="submit">Add Expense</button>
      <button id="cancelEditBtn" type="button" class="secondary-btn" style="display: none;">Cancel Edit</button>
    </form>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Expense List</h2>
      <div class="filters">
        <input id="searchInput" placeholder="Search title..." />
        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>
        <select id="sortSelect">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="amount-high">Amount: High to Low</option>
          <option value="amount-low">Amount: Low to High</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
      </table>
    </div>
  </section>
</div>
<script src="dashboard.js"></script>
</body>
</html>
